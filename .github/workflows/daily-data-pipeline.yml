name: Daily Data Pipeline

on:
  schedule:
    # Cron 1: Live market + IDX fundamentals
    - cron: '0 14 * * 1-5'
    # Cron 2: Yahoo EOD sync (06:30 UTC = 13:30 WIB, after IDX close)
    - cron: '30 6 * * 1-5'
  workflow_dispatch:
    inputs:
      run_fetch:
        description: 'Full historical data fetch (Yahoo, 93 tickers)'
        required: false
        default: false
        type: boolean
      run_fundamentals:
        description: 'Scrape IDX fundamentals (27 years)'
        required: false
        default: false
        type: boolean

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: npm ci

      - run: pip install curl-cffi

      - name: Generate live_market.json
        run: python scripts/post_process_live_market.py
        timeout-minutes: 5

      - name: Sync daily market data (Yahoo EOD)
        run: npx tsx scripts/sync-daily-data.ts --force
        timeout-minutes: 10

      - name: Scrape IDX fundamentals (manual only)
        if: inputs.run_fundamentals
        run: python scripts/scrape_idx_fundamentals.py
        timeout-minutes: 30

      - name: Fetch historical data (manual only)
        if: inputs.run_fetch
        run: npx tsx scripts/fetch_historical_data.ts
        timeout-minutes: 30

      - name: Build (verify)
        run: npm run build

      - name: Commit & push updated data
        run: |
          git config user.name "QuantBot"
          git config user.email "bot@quantbit.app"
          git add data/live_market.json data/idx_fundamentals_all.json data/regime_history.json data/years/ data/historical_market.sqlite
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily data update [skip ci]"
            git push
          fi
